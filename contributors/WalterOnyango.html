<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walter Onyango — Contributor Profile</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      padding: 32px 36px 36px;
      max-width: 720px;
      width: 100%;
    }

    .name {
      font-size: 1.45rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 10px;
    }

    .bio {
      font-size: 0.97rem;
      color: #333;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .bio a {
      color: #1a6bd4;
      text-decoration: underline;
    }

    .section-title {
      font-size: 0.97rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 14px;
    }

    /* --- Language badges --- */
    .languages {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 30px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      background: #111;
      letter-spacing: 0.01em;
    }

    .badge.go      { background: #00ACD7; color: #fff; }
    .badge.python  { background: #111; color: #FFD43B; }
    .badge.c       { background: #111; }
    .badge.js      { background: #F7DF1E; color: #111; }
    .badge.bash    { background: #2D2D2D; }

    .badge-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* --- Tool icons --- */
    .tools {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: center;
    }

    .tool-icon {
      width: 36px;
      height: 36px;
      object-fit: contain;
      display: block;
    }

    /* SVG inline icons */
    .tool-svg {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .divider {
      height: 1px;
      background: #e8e8e8;
      margin: 28px 0;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="name">Walter Onyango</div>

    <p class="bio">
      Software Engineer at <a href="https://zone01kisumu.ke" target="_blank">Zone01 Kisumu</a>
      building systems in Go &amp; Python, exploring
      <a href="https://github.com/waonyango" target="_blank">open-source Bitcoin development</a>,
      and interested in cybersecurity &amp; cloud security. 🇰🇪
    </p>

    <div class="section-title">Programming languages I speak</div>

    <div class="languages">
      <span class="badge go">
        <span class="badge-dot" style="background:#fff;"></span>
        Go
      </span>
      <span class="badge python">
        <span class="badge-dot" style="background:#FFD43B;"></span>
        Python
      </span>
      <span class="badge c">C</span>
      <span class="badge js">JavaScript</span>
      <span class="badge bash">Bash</span>
    </div>

    </div>

  </div>
</body>
</html>
